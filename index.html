<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CHAOSLINE</title>
<link rel="preload" as="image" href="loading.png">
<link rel="preload" as="image" href="main_menu.png">
<link rel="preload" as="image" href="world_select.png">
<link rel="preload" as="image" href="level_select.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;font-family:'Press Start 2P',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff}
#cl-app{position:fixed;inset:0;overflow:hidden;background:#000}
.cl-screen{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#000;display:none}
.cl-screen.cl-active{display:block}
.cl-hit{position:absolute;background:rgba(255,0,68,.20);border:2px solid #ff0044;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:visible}
.cl-hit *{pointer-events:none}
.cl-hit.cl-selected{background:rgba(255,220,0,.4);border:3px solid #ffdd00;box-shadow:0 0 14px #ffdd00;z-index:100}
.cl-hit-label{font-size:8px;color:#fff;background:#ff0044;padding:1px 3px;white-space:nowrap;font-weight:bold}
.cl-hit.cl-selected .cl-hit-label{background:#ffdd00;color:#000}
.cl-hit-coords{font-size:7px;color:#fff;background:rgba(0,0,0,.9);padding:1px 3px;margin-top:1px;white-space:nowrap;line-height:1.2;text-align:center}
.cl-hit.cl-selected .cl-hit-coords{background:#ffdd00;color:#000}
#cl-fab{position:fixed;top:8px;left:8px;background:rgba(0,0,0,.7);border:1px solid #ff0044;color:#fff;width:34px;height:34px;font-family:'Press Start 2P',monospace;font-size:14px;z-index:9500;border-radius:4px}
#cl-panel{position:fixed;top:50px;left:8px;background:rgba(0,0,0,.9);border:2px solid #ff0044;padding:5px;z-index:9500;display:none;flex-direction:column;gap:3px;width:70px}
#cl-panel.cl-open{display:flex}
.cl-tbtn{background:#222;color:#fff;border:1px solid #ff0044;padding:6px 3px;font-family:'Press Start 2P',monospace;font-size:7px;text-align:center}
.cl-tbtn.cl-nav{background:#004488;border-color:#0088ff}
.cl-tbtn.cl-exp{background:#00aa44;border-color:#00ff88}
#cl-nudge{position:fixed;right:6px;bottom:6px;background:rgba(0,0,0,.8);border:2px solid #ffdd00;padding:3px;z-index:9000;display:grid;grid-template-columns:repeat(3,30px);grid-gap:2px;border-radius:4px}
.cl-nb{background:#222;color:#ffdd00;border:1px solid #ffdd00;font-family:'Press Start 2P',monospace;font-size:10px;padding:6px 0;text-align:center}
.cl-nb.cl-empty{visibility:hidden}
#cl-steps{position:fixed;right:6px;top:8px;background:rgba(0,0,0,.8);border:1px solid #ffdd00;padding:3px;z-index:9000;display:flex;gap:2px;border-radius:4px}
.cl-sb{background:#222;color:#ffdd00;border:1px solid #ffdd00;padding:4px 5px;font-family:'Press Start 2P',monospace;font-size:7px}
.cl-sb.cl-on{background:#ffdd00;color:#000}
#cl-status{position:fixed;left:50px;top:12px;font-size:8px;color:#ffdd00;background:rgba(0,0,0,.7);padding:3px 6px;border:1px solid #ffdd00;z-index:9000;border-radius:3px}
#cl-export{position:fixed;inset:20px;background:#000;border:3px solid #00ff88;padding:12px;z-index:9800;display:none;overflow:auto;font-size:9px;line-height:1.6;color:#0f0;white-space:pre-wrap}
#cl-export.cl-show{display:block}
#cl-export-close{position:fixed;top:28px;right:28px;background:#ff0044;color:#fff;border:none;padding:8px 12px;font-family:'Press Start 2P',monospace;font-size:9px;z-index:9900;display:none;border-radius:3px}
#cl-export-close.cl-show{display:block}
#cl-rotate{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
@media (orientation: portrait){#cl-rotate{display:flex}}
.cl-phone{font-size:80px;animation:cl-bounce 1s infinite}
@keyframes cl-bounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(90deg)}}
.cl-rotate-title{color:gold;font-size:18px;margin:24px 0 12px;letter-spacing:2px}
.cl-rotate-sub{color:#aaa;font-size:10px;margin-bottom:32px;line-height:1.6}
.cl-rotate-btn{background:gold;color:#000;border:none;padding:16px 28px;font-family:'Press Start 2P',monospace;font-size:12px;box-shadow:0 4px 0 #a67c00;border-radius:4px;display:flex;align-items:center;gap:10px}
.cl-rotate-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #a67c00}
.cl-spin{display:inline-block;animation:cl-spin 2s linear infinite;font-size:16px}
@keyframes cl-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="cl-app">
  <div id="cl-screen-loading" class="cl-screen" style="background-image:url('loading.png')"></div>
  <div id="cl-screen-menu" class="cl-screen cl-active" style="background-image:url('main_menu.png')"></div>
  <div id="cl-screen-worlds" class="cl-screen" style="background-image:url('world_select.png')"></div>
  <div id="cl-screen-levels" class="cl-screen" style="background-image:url('level_select.png')"></div>
</div>

<button id="cl-fab" onclick="document.getElementById('cl-panel').classList.toggle('cl-open')">☰</button>

<div id="cl-panel">
  <button class="cl-tbtn cl-nav" onclick="cl_show('loading')">LOAD</button>
  <button class="cl-tbtn cl-nav" onclick="cl_show('menu')">MENU</button>
  <button class="cl-tbtn cl-nav" onclick="cl_show('worlds')">WRLD</button>
  <button class="cl-tbtn cl-nav" onclick="cl_show('levels')">LVLS</button>
  <button class="cl-tbtn" onclick="cl_addHit()">+ADD</button>
  <button class="cl-tbtn" onclick="cl_delHit()">DEL</button>
  <button class="cl-tbtn cl-exp" onclick="cl_export()">EXP</button>
  <button class="cl-tbtn" onclick="if(confirm('Reset?'))cl_reset()">RST</button>
</div>

<div id="cl-status">MENU</div>

<div id="cl-steps">
  <button class="cl-sb" onclick="cl_setStep(0.1)">.1</button>
  <button class="cl-sb cl-on" onclick="cl_setStep(1)">1</button>
  <button class="cl-sb" onclick="cl_setStep(5)">5</button>
</div>

<div id="cl-nudge">
  <button class="cl-nb cl-empty"></button>
  <button class="cl-nb" onclick="cl_nudge('y',-1)">↑</button>
  <button class="cl-nb cl-empty"></button>
  <button class="cl-nb" onclick="cl_nudge('x',-1)">←</button>
  <button class="cl-nb" id="cl-mode" onclick="cl_mode()">M</button>
  <button class="cl-nb" onclick="cl_nudge('x',1)">→</button>
  <button class="cl-nb cl-empty"></button>
  <button class="cl-nb" onclick="cl_nudge('y',1)">↓</button>
  <button class="cl-nb cl-empty"></button>
</div>

<div id="cl-export"></div>
<button id="cl-export-close" onclick="document.getElementById('cl-export').classList.remove('cl-show');this.classList.remove('cl-show')">CLOSE</button>

<div id="cl-rotate">
  <div class="cl-phone">📱</div>
  <div class="cl-rotate-title">ROTATE YOUR PHONE</div>
  <div class="cl-rotate-sub">CHAOSLINE plays in landscape</div>
  <button class="cl-rotate-btn" onclick="cl_forceLandscape()"><span class="cl-spin">↻</span> TAP TO ROTATE</button>
</div>

<script>
var CL_current='menu';
var CL_selected=null;
var CL_mode='M';
var CL_step=1;
var CL_hits={loading:[],menu:[],worlds:[],levels:[]};

var CL_defaults={
  loading:[],
  menu:[
    {l:'PLAY',x:18,y:32,w:28,h:15},
    {l:'SKIN',x:18,y:51,w:13,h:10},
    {l:'SHOP',x:33,y:51,w:13,h:10},
    {l:'BACKPACK',x:18,y:65,w:13,h:10},
    {l:'STATS',x:33,y:65,w:15,h:10},
    {l:'HOW',x:25,y:82,w:15,h:5},
    {l:'COINS',x:82,y:5,w:15,h:11}
  ],
  worlds:[
    {l:'BACK',x:10,y:5,w:6,h:12},
    {l:'OVERWORLD',x:15,y:18,w:20,h:75},
    {l:'INFERNO',x:40,y:18,w:20,h:75},
    {l:'ABYSS',x:65,y:18,w:20,h:75}
  ],
  levels:[
    {l:'BACK',x:10,y:6,w:5,h:12},
    {l:'L1',x:27,y:40,w:6,h:12},
    {l:'L2',x:37,y:40,w:6,h:12},
    {l:'L3',x:47,y:40,w:6,h:12},
    {l:'L4',x:57,y:40,w:6,h:12},
    {l:'L5',x:67,y:40,w:6,h:12},
    {l:'L10',x:27,y:66,w:6,h:12},
    {l:'L6',x:37,y:66,w:6,h:12},
    {l:'L7',x:47,y:66,w:6,h:12},
    {l:'L8',x:57,y:66,w:6,h:12},
    {l:'L9',x:67,y:66,w:6,h:12},
    {l:'BOSS',x:82,y:52,w:10,h:22}
  ]
};

function cl_loadStored(){
  var s=localStorage.getItem('CL_tuner5');
  if(s){try{CL_hits=JSON.parse(s);return}catch(e){}}
  cl_reset(true);
}
function cl_save(){localStorage.setItem('CL_tuner5',JSON.stringify(CL_hits))}
function cl_reset(silent){
  CL_hits=JSON.parse(JSON.stringify(CL_defaults));
  cl_save();
  if(!silent)cl_render();
}

function cl_show(name){
  CL_current=name;
  CL_selected=null;
  document.querySelectorAll('.cl-screen').forEach(function(s){s.classList.remove('cl-active')});
  document.getElementById('cl-screen-'+name).classList.add('cl-active');
  document.getElementById('cl-panel').classList.remove('cl-open');
  cl_updateStatus();
  cl_render();
}

function cl_updateStatus(){
  var sel=CL_selected!==null?' | '+CL_hits[CL_current][CL_selected].l:'';
  document.getElementById('cl-status').textContent=CL_current.toUpperCase()+sel+' | '+CL_mode+CL_step;
}

function cl_render(){
  document.querySelectorAll('.cl-hit').forEach(function(h){h.remove()});
  var screen=document.getElementById('cl-screen-'+CL_current);
  var arr=CL_hits[CL_current];
  arr.forEach(function(h,i){
    var d=document.createElement('div');
    d.className='cl-hit';
    d.style.left=h.x+'%';d.style.top=h.y+'%';
    d.style.width=h.w+'%';d.style.height=h.h+'%';
    d.setAttribute('data-idx',i);
    var c='x'+h.x.toFixed(1)+' y'+h.y.toFixed(1)+'<br>w'+h.w.toFixed(1)+' h'+h.h.toFixed(1);
    d.innerHTML='<div class="cl-hit-label">'+h.l+'</div><div class="cl-hit-coords">'+c+'</div>';
    if(CL_selected===i)d.classList.add('cl-selected');
    screen.appendChild(d);
  });
}

document.getElementById('cl-app').addEventListener('click',function(e){
  var hit=e.target.closest('.cl-hit');
  if(hit){
    CL_selected=parseInt(hit.getAttribute('data-idx'));
    cl_updateStatus();
    cl_render();
  }
});

function cl_nudge(axis,dir){
  if(CL_selected===null)return;
  var h=CL_hits[CL_current][CL_selected];
  var d=dir*CL_step;
  if(CL_mode==='M'){
    if(axis==='x')h.x=Math.max(0,Math.min(99,h.x+d));
    else h.y=Math.max(0,Math.min(99,h.y+d));
  } else {
    if(axis==='x')h.w=Math.max(0.5,Math.min(100,h.w+d));
    else h.h=Math.max(0.5,Math.min(100,h.h+d));
  }
  cl_save();cl_render();cl_updateStatus();
}

function cl_mode(){
  CL_mode=CL_mode==='M'?'S':'M';
  document.getElementById('cl-mode').textContent=CL_mode;
  cl_updateStatus();
}

function cl_setStep(v){
  CL_step=v;
  document.querySelectorAll('.cl-sb').forEach(function(b){b.classList.remove('cl-on')});
  event.target.classList.add('cl-on');
  cl_updateStatus();
}

function cl_addHit(){
  var name=prompt('Label:','NEW');
  if(!name)return;
  CL_hits[CL_current].push({l:name,x:40,y:40,w:15,h:10});
  CL_selected=CL_hits[CL_current].length-1;
  cl_save();cl_render();cl_updateStatus();
}
function cl_delHit(){
  if(CL_selected===null)return;
  CL_hits[CL_current].splice(CL_selected,1);
  CL_selected=null;
  cl_save();cl_render();cl_updateStatus();
}

function cl_export(){
  var out='=== CHAOSLINE COORDS ===\n\n';
  ['menu','worlds','levels'].forEach(function(s){
    out+='['+s.toUpperCase()+']\n';
    CL_hits[s].forEach(function(h){
      out+=h.l+': x='+h.x.toFixed(2)+' y='+h.y.toFixed(2)+' w='+h.w.toFixed(2)+' h='+h.h.toFixed(2)+'\n';
    });
    out+='\n';
  });
  var el=document.getElementById('cl-export');
  el.textContent=out;
  el.classList.add('cl-show');
  document.getElementById('cl-export-close').classList.add('cl-show');
}

function cl_forceLandscape(){
  if(navigator.vibrate)navigator.vibrate([50,30,50]);
  try{
    var el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    setTimeout(function(){
      if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});
    },300);
  }catch(e){}
}

cl_loadStored();
cl_show('menu');
</script>
</body>
</html>
