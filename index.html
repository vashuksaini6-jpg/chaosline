<html lang="en">
<head>

<link rel="preload" as="image" href="level_select.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;font-family:'Press Start 2P',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff}
#cl-app{position:fixed;inset:0;overflow:hidden;background:#000;transition:transform .1s}
#cl-app.cl-shake{animation:cl-shake .35s ease-in-out}
@keyframes cl-shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-6px,3px)}20%{transform:translate(5px,-4px)}30%{transform:translate(-5px,-3px)}40%{transform:translate(4px,4px)}50%{transform:translate(-4px,2px)}60%{transform:translate(3px,-3px)}70%{transform:translate(-3px,3px)}80%{transform:translate(2px,-2px)}90%{transform:translate(-2px,1px)}}

.cl-screen{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#000;display:none;opacity:0;transition:opacity .5s ease}
.cl-screen.cl-active{display:block;opacity:1}

.cl-hit{position:absolute;cursor:pointer;background:transparent;border:none}
.cl-hit:active{transform:scale(.94);transition:transform .08s ease}
.cl-hit.cl-locked{cursor:not-allowed}
.cl-hit.cl-locked::after{content:"🔒";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,40px);text-shadow:0 0 6px #000,0 0 10px #000;filter:drop-shadow(0 0 4px rgba(0,0,0,.9));z-index:5;pointer-events:none}
.cl-hit.cl-locked::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:4}
.cl-hit:not(.cl-locked){animation:cl-pulse 2.5s ease-in-out infinite}
@keyframes cl-pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}

.cl-ripple{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,60,60,.7),rgba(255,255,255,.4) 30%,transparent 70%);pointer-events:none;transform:translate(-50%,-50%) scale(0);animation:cl-rip .55s ease-out forwards;z-index:9000}
@keyframes cl-rip{to{transform:translate(-50%,-50%) scale(4);opacity:0}}

.cl-spark{position:fixed;width:6px;height:6px;pointer-events:none;z-index:9600;border-radius:50%;box-shadow:0 0 8px currentColor,0 0 14px currentColor}

#cl-loadbar{position:absolute;left:12.5%;bottom:11%;width:75%;height:5.5%;overflow:hidden;z-index:3}
#cl-loadbar-fill{width:0%;height:100%;background:linear-gradient(90deg,#8b0000,#ff2222 40%,#ff6644 70%,#ffaa66);box-shadow:0 0 14px #ff0000,inset 0 0 6px rgba(255,255,255,.2);transition:width .1s linear;position:relative}
#cl-loadbar-fill::after{content:"";position:absolute;top:0;right:-2px;width:6px;height:100%;background:#fff;box-shadow:0 0 14px #fff,0 0 22px #ff4444;animation:cl-flick .3s ease-in-out infinite}
@keyframes cl-flick{0%,100%{opacity:1}50%{opacity:.5}}

.cl-ember{position:absolute;background:#ff4400;border-radius:50%;box-shadow:0 0 6px #ff6600,0 0 12px #ff2200;pointer-events:none;z-index:2;opacity:.8;animation:cl-float linear infinite}
@keyframes cl-float{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:.9}90%{opacity:.5}100%{transform:translateY(-100vh) translateX(20px);opacity:0}}

/* UPGRADED JAW TRANSITION */
#cl-jaw{position:fixed;inset:0;pointer-events:none;z-index:9500;display:none;overflow:hidden}
#cl-jaw.cl-show{display:block}
.cl-jaw-top,.cl-jaw-bot{position:absolute;left:-2%;width:104%;height:54%;background:linear-gradient(to bottom,#000 0%,#1a0000 50%,#2a0000 100%);transition:transform .5s cubic-bezier(.6,-.1,.4,1)}
.cl-jaw-top{top:0;transform:translateY(-102%);box-shadow:0 8px 40px #ff0000,0 0 80px rgba(255,0,0,.6),inset 0 -20px 40px rgba(255,0,0,.3)}
.cl-jaw-bot{bottom:0;transform:translateY(102%);box-shadow:0 -8px 40px #ff0000,0 0 80px rgba(255,0,0,.6),inset 0 20px 40px rgba(255,0,0,.3)}
/* SHARP PIXEL TEETH via SVG-like gradient */
.cl-teeth-top,.cl-teeth-bot{position:absolute;left:0;right:0;height:40px;pointer-events:none}
.cl-teeth-top{bottom:-40px;background:linear-gradient(180deg,#0a0000 0%,#1a0000 100%);clip-path:polygon(0 0,100% 0,100% 30%,97% 100%,94% 30%,91% 100%,88% 30%,85% 100%,82% 30%,79% 100%,76% 30%,73% 100%,70% 30%,67% 100%,64% 30%,61% 100%,58% 30%,55% 100%,52% 30%,49% 100%,46% 30%,43% 100%,40% 30%,37% 100%,34% 30%,31% 100%,28% 30%,25% 100%,22% 30%,19% 100%,16% 30%,13% 100%,10% 30%,7% 100%,4% 30%,1% 100%,0 30%);filter:drop-shadow(0 4px 8px #ff0000)}
.cl-teeth-bot{top:-40px;background:linear-gradient(0deg,#0a0000 0%,#1a0000 100%);clip-path:polygon(0 100%,100% 100%,100% 70%,97% 0,94% 70%,91% 0,88% 70%,85% 0,82% 70%,79% 0,76% 70%,73% 0,70% 70%,67% 0,64% 70%,61% 0,58% 70%,55% 0,52% 70%,49% 0,46% 70%,43% 0,40% 70%,37% 0,34% 70%,31% 0,28% 70%,25% 0,22% 70%,19% 0,16% 70%,13% 0,10% 70%,7% 0,4% 70%,1% 0,0 70%);filter:drop-shadow(0 -4px 8px #ff0000)}
/* GLOWING THROAT */
.cl-throat{position:absolute;left:0;right:0;top:50%;height:6%;background:radial-gradient(ellipse at center,#ff2200 0%,#8b0000 40%,transparent 80%);transform:translateY(-50%) scaleY(0);transition:transform .3s ease-out;pointer-events:none;filter:blur(2px)}
#cl-jaw.cl-closed .cl-throat{transform:translateY(-50%) scaleY(1)}
#cl-jaw.cl-closing .cl-jaw-top{transform:translateY(-46%)}
#cl-jaw.cl-closing .cl-jaw-bot{transform:translateY(46%)}

#cl-popup{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .3s}
#cl-popup.cl-show{display:flex;opacity:1}
.cl-popup-box{background:linear-gradient(135deg,#1a0505,#2a0808);border:3px solid #ff2222;padding:20px 28px;max-width:80%;text-align:center;box-shadow:0 0 30px #ff0000,inset 0 0 20px rgba(255,0,0,.2);transform:scale(.8);transition:transform .3s cubic-bezier(.4,2,.6,1)}
#cl-popup.cl-show .cl-popup-box{transform:scale(1)}
.cl-popup-title{color:#ff4444;font-size:13px;margin-bottom:12px;letter-spacing:2px;text-shadow:0 0 8px #ff0000}
.cl-popup-msg{color:#fff;font-size:9px;line-height:1.7;margin-bottom:18px;white-space:pre-line}
.cl-popup-close{background:linear-gradient(180deg,#ff4444,#cc0000);color:#fff;border:none;padding:10px 22px;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;box-shadow:0 3px 0 #660000;letter-spacing:1px}

#cl-corner{position:fixed;bottom:6px;left:6px;z-index:8000;display:flex;gap:4px}
.cl-cbtn{background:rgba(0,0,0,.7);border:1px solid #ff2222;color:#fff;padding:6px 8px;font-family:'Press Start 2P',monospace;font-size:11px;cursor:pointer;border-radius:3px}

#cl-rotate{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
@media (orientation: portrait){#cl-rotate{display:flex}}
.cl-phone{font-size:80px;animation:cl-bounce 1s infinite}
@keyframes cl-bounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(90deg)}}
.cl-rotate-title{color:gold;font-size:18px;margin:24px 0 12px;letter-spacing:2px}
.cl-rotate-sub{color:#aaa;font-size:10px;margin-bottom:32px;line-height:1.6}
.cl-rotate-btn{background:gold;color:#000;border:none;padding:16px 28px;font-family:'Press Start 2P',monospace;font-size:12px;box-shadow:0 4px 0 #a67c00;border-radius:4px;display:flex;align-items:center;gap:10px}
.cl-spin{display:inline-block;animation:cl-spin 2s linear infinite;font-size:16px}
@keyframes cl-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

body{animation:cl-fadein 1s ease-in}
@keyframes cl-fadein{from{opacity:0;filter:brightness(0)}to{opacity:1;filter:brightness(1)}}

#cl-startgate{position:fixed;inset:0;background:#000;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer}
#cl-startgate.cl-hide{display:none}
.cl-gate-title{color:#ff2222;font-size:24px;letter-spacing:4px;text-shadow:0 0 20px #ff0000;animation:cl-gpulse 1.5s ease-in-out infinite}
.cl-gate-sub{color:#fff;font-size:10px;margin-top:20px;animation:cl-blink 1s infinite}
@keyframes cl-gpulse{0%,100%{text-shadow:0 0 20px #ff0000}50%{text-shadow:0 0 40px #ff4444,0 0 60px #ff0000}}
@keyframes cl-blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

<script>
var CL_coins=parseInt(localStorage.getItem('CL_coins')||'0');
var CL_unlockedLevels=JSON.parse(localStorage.getItem('CL_unlockedLevels')||'[1]');
var CL_unlockedWorlds=JSON.parse(localStorage.getItem('CL_unlockedWorlds')||'[0]');
var CL_soundMuted=localStorage.getItem('CL_soundMuted')==='1';
var CL_musicMuted=localStorage.getItem('CL_musicMuted')==='1';
var CL_audioCtx=null;
var CL_musicNodes=null;

function cl_audio(){if(!CL_audioCtx){try{CL_audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return CL_audioCtx}
function cl_beep(freq,endFreq,type,dur,vol){
  if(CL_soundMuted)return;var ctx=cl_audio();if(!ctx)return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(freq,ctx.currentTime);
  if(endFreq)o.frequency.exponentialRampToValueAtTime(Math.max(1,endFreq),ctx.currentTime+dur);
  g.gain.setValueAtTime(vol||.15,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);
}
function cl_arp(freqs,type,each,vol){
  freqs.forEach(function(f,i){setTimeout(function(){cl_beep(f,f*1.4,type,each,vol)},i*each*1000)});
}
function cl_snd(n){
  switch(n){
    case 'click':cl_beep(820,600,'square',.09,.14);break;
    case 'chomp':cl_beep(90,30,'sawtooth',.5,.35);setTimeout(function(){cl_beep(60,20,'sawtooth',.3,.25)},80);break;
    case 'pop':cl_beep(560,920,'sine',.18,.18);break;
    case 'lock':cl_beep(190,95,'square',.28,.18);break;
    case 'unlock':cl_arp([880,1108,1318],'sine',.12,.2);break;
    case 'load':cl_beep(440,660,'sine',.15,.1);break;
    case 'boot':cl_arp([523,659,784,1046,1318],'sine',.12,.18);break;
    case 'spark':cl_beep(2000,3000,'square',.05,.1);break;
  }
}
function cl_vibe(ms){if(navigator.vibrate)navigator.vibrate(ms)}

/* BACKGROUND MUSIC — dark ambient loop, procedural */
function cl_startMusic(){
  if(CL_musicMuted||CL_musicNodes)return;
  var ctx=cl_audio();if(!ctx)return;
  var master=ctx.createGain();master.gain.value=0;master.connect(ctx.destination);
  master.gain.linearRampToValueAtTime(.09,ctx.currentTime+3);

  // Deep drone bass (root A1 = 55Hz)
  var drone=ctx.createOscillator();drone.type='sawtooth';drone.frequency.value=55;
  var droneG=ctx.createGain();droneG.gain.value=.5;
  var droneF=ctx.createBiquadFilter();droneF.type='lowpass';droneF.frequency.value=180;droneF.Q.value=6;
  drone.connect(droneF);droneF.connect(droneG);droneG.connect(master);drone.start();

  // Fifth drone (E2 = 82Hz)
  var fifth=ctx.createOscillator();fifth.type='sawtooth';fifth.frequency.value=82;
  var fifthG=ctx.createGain();fifthG.gain.value=.25;
  var fifthF=ctx.createBiquadFilter();fifthF.type='lowpass';fifthF.frequency.value=220;
  fifth.connect(fifthF);fifthF.connect(fifthG);fifthG.connect(master);fifth.start();

  // Slow LFO on filter for breathing effect
  var lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=.08;
  var lfoG=ctx.createGain();lfoG.gain.value=80;
  lfo.connect(lfoG);lfoG.connect(droneF.frequency);lfo.start();

  // Melodic minor arpeggio ostinato — A minor pentatonic
  var notes=[220,261.63,329.63,392,329.63,261.63]; // A3 C4 E4 G4 E4 C4
  var noteIdx=0;
  var arpG=ctx.createGain();arpG.gain.value=.06;arpG.connect(master);
  var delay=ctx.createDelay();delay.delayTime.value=.375;
  var delayFB=ctx.createGain();delayFB.gain.value=.45;
  var delayG=ctx.createGain();delayG.gain.value=.5;
  arpG.connect(delay);delay.connect(delayFB);delayFB.connect(delay);delay.connect(delayG);delayG.connect(master);

  var arpInterval=setInterval(function(){
    if(!CL_musicNodes)return;
    var f=notes[noteIdx%notes.length];noteIdx++;
    var o=ctx.createOscillator();o.type='triangle';o.frequency.value=f;
    var g=ctx.createGain();
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(.4,ctx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
    o.connect(g);g.connect(arpG);
    o.start();o.stop(ctx.currentTime+.5);
  },500);

  // Occasional distant bell (random chords)
  var bellInterval=setInterval(function(){
    if(!CL_musicNodes||Math.random()>.4)return;
    var bell=ctx.createOscillator();bell.type='sine';
    var bellF=[880,1108,1318][Math.floor(Math.random()*3)];
    bell.frequency.value=bellF;
    var bg=ctx.createGain();
    bg.gain.setValueAtTime(0,ctx.currentTime);
    bg.gain.linearRampToValueAtTime(.05,ctx.currentTime+.1);
    bg.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+3);
    bell.connect(bg);bg.connect(master);
    bell.start();bell.stop(ctx.currentTime+3);
  },4000);

  CL_musicNodes={master:master,drone:drone,fifth:fifth,lfo:lfo,arpInt:arpInterval,bellInt:bellInterval,ctx:ctx};
}
function cl_stopMusic(){
  if(!CL_musicNodes)return;
  var m=CL_musicNodes;
  m.master.gain.linearRampToValueAtTime(0,m.ctx.currentTime+.5);
  clearInterval(m.arpInt);clearInterval(m.bellInt);
  setTimeout(function(){try{m.drone.stop();m.fifth.stop();m.lfo.stop()}catch(e){}},600);
  CL_musicNodes=null;
}
function cl_toggleMusic(){
  CL_musicMuted=!CL_musicMuted;
  localStorage.setItem('CL_musicMuted',CL_musicMuted?'1':'0');
  document.getElementById('cl-music').textContent=CL_musicMuted?'🎵̸':'🎵';
  if(CL_musicMuted)cl_stopMusic();else cl_startMusic();
  cl_vibe(22);
}

/* SCREEN */
function cl_show(id){
  document.querySelectorAll('.cl-screen').forEach(function(s){s.classList.remove('cl-active')});
  var el=document.getElementById('cl-screen-'+id);if(el)el.classList.add('cl-active');
}

/* UPGRADED JAW TRANSITION */
function cl_shake(){
  var app=document.getElementById('cl-app');
  app.classList.add('cl-shake');
  setTimeout(function(){app.classList.remove('cl-shake')},350);
}
function cl_bite(x,y){
  // sparks bursting from center
  var colors=['#ffdd00','#ff4400','#ffffff','#ff0000','#ffaa00','#ff6600'];
  for(var i=0;i<12;i++){
    var s=document.createElement('div');
    s.className='cl-spark';
    s.style.color=colors[i%colors.length];
    s.style.background=colors[i%colors.length];
    s.style.left=(50+Math.random()*4-2)+'%';
    s.style.top='50%';
    var ang=(i/12)*Math.PI*2;
    var dist=80+Math.random()*120;
    var tx=Math.cos(ang)*dist;
    var ty=Math.sin(ang)*dist;
    s.animate([
      {transform:'translate(-50%,-50%) scale(1)',opacity:1},
      {transform:'translate('+(tx-50)+'%,'+(ty-50)+'%) scale(0)',opacity:0}
    ],{duration:700,easing:'cubic-bezier(.3,.7,.4,1)'});
    document.body.appendChild(s);
    setTimeout(function(sp){return function(){sp.remove()}}(s),700);
  }
  cl_snd('spark');
}
function cl_transition(toId){
  var jaw=document.getElementById('cl-jaw');
  jaw.classList.add('cl-show','cl-closing');
  cl_snd('chomp');cl_vibe([80,20,120]);
  // impact at close
  setTimeout(function(){
    jaw.classList.add('cl-closed');
    cl_shake();
    cl_bite();
    cl_vibe(60);
    cl_show(toId);
  },500);
  // reopen
  setTimeout(function(){
    jaw.classList.remove('cl-closing','cl-closed');
    cl_snd('pop');
  },750);
  setTimeout(function(){jaw.classList.remove('cl-show')},1300);
}

/* POPUP */
function cl_popup(title,msg){
  document.getElementById('cl-popup-title').textContent=title;
  document.getElementById('cl-popup-msg').textContent=msg;
  document.getElementById('cl-popup').classList.add('cl-show');
  cl_snd('pop');cl_vibe(40);
}
function cl_closePopup(){
  document.getElementById('cl-popup').classList.remove('cl-show');
  cl_snd('click');cl_vibe(22);
}

function cl_ripple(x,y){
  var r=document.createElement('div');r.className='cl-ripple';
  r.style.left=x+'px';r.style.top=y+'px';
  r.style.width='140px';r.style.height='140px';
  document.body.appendChild(r);
  setTimeout(function(){r.remove()},600);
}

document.addEventListener('click',function(e){
  var t=e.target.closest('.cl-hit');if(!t)return;
  cl_ripple(e.clientX,e.clientY);
  var act=t.getAttribute('data-cl-action');
  if(t.classList.contains('cl-locked')){
    cl_snd('lock');cl_vibe(60);
    cl_popup('LOCKED','Complete previous stage to unlock this content.');
    return;
  }
  cl_snd('click');cl_vibe(22);
  switch(act){
    case 'play':cl_transition('worlds');break;
    case 'soon':cl_popup('COMING SOON',(t.getAttribute('data-cl-name')||'This feature')+' ships in the next update.');break;
    case 'howto':cl_popup('HOW TO PLAY','Tap = jump.\nReach the flag.\nAvoid every trap.\nDie = restart.\nRage responsibly.');break;
    case 'coins':cl_popup('COINS','Balance: '+CL_coins+' coins.\n\nEarn by beating levels + finding hidden pickups.');break;
    case 'back-menu':cl_transition('menu');break;
    case 'back-worlds':cl_transition('worlds');break;
    case 'world':
      var w=parseInt(t.getAttribute('data-cl-world'));
      if(CL_unlockedWorlds.indexOf(w)<0){cl_snd('lock');cl_popup('WORLD LOCKED','Beat the previous world first.');return}
      cl_transition('levels');break;
    case 'level':
      var lv=parseInt(t.getAttribute('data-cl-level'));
      cl_popup('LEVEL '+lv,'Gameplay engine ships next build.\nMenu system verified.');break;
    case 'boss':cl_popup('HOLLOW KING','Boss fight unlocks after Level 10.');break;
  }
});

function cl_forceLandscape(){
  cl_vibe([50,30,50]);
  try{
    var el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    setTimeout(function(){if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){})},300);
  }catch(e){}
}

function cl_toggleMute(){
  CL_soundMuted=!CL_soundMuted;
  localStorage.setItem('CL_soundMuted',CL_soundMuted?'1':'0');
  document.getElementById('cl-mute').textContent=CL_soundMuted?'🔇':'🔊';
  cl_vibe(22);
}
document.getElementById('cl-mute').textContent=CL_soundMuted?'🔇':'🔊';
document.getElementById('cl-music').textContent=CL_musicMuted?'🎵̸':'🎵';

function cl_spawnEmbers(){
  var app=document.getElementById('cl-app');
  for(var i=0;i<18;i++){
    var e=document.createElement('div');
    e.className='cl-ember';
    e.style.left=(Math.random()*100)+'%';
    e.style.bottom='-10px';
    e.style.animationDuration=(6+Math.random()*7)+'s';
    e.style.animationDelay=(Math.random()*10)+'s';
    var sz=(2+Math.random()*3);
    e.style.width=sz+'px';e.style.height=sz+'px';
    app.appendChild(e);
  }
}

function cl_runLoading(){
  var bar=document.getElementById('cl-loadbar-fill');
  var p=0;
  cl_snd('boot');
  var iv=setInterval(function(){
    p+=2.5;
    bar.style.width=p+'%';
    if(p%20===0)cl_snd('load');
    if(p>=100){
      clearInterval(iv);
      setTimeout(function(){cl_transition('menu');cl_spawnEmbers()},400);
    }
  },100);
}

/* START GATE — required to enable audio on mobile */
function cl_startBoot(){
  document.getElementById('cl-startgate').classList.add('cl-hide');
  cl_audio(); // init AudioContext with user gesture
  cl_startMusic();
  setTimeout(cl_runLoading,300);
}
</script>
</body>
