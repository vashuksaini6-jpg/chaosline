<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CHAOSLINE — Tuner v14.1b</title>
<link rel="preload" as="image" href="loading.png">
<link rel="preload" as="image" href="main_menu.png">
<link rel="preload" as="image" href="world_select.png">
<link rel="preload" as="image" href="level_select.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;font-family:'Press Start 2P',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;touch-action:none}
#cl-app{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;background:#000}

.cl-screen{position:absolute;inset:0;width:100%;height:100%;background-size:contain;background-position:center;background-repeat:no-repeat;background-color:#000;display:none}
.cl-screen.cl-active{display:block}

.cl-hit{position:absolute;background:rgba(255,0,68,.22);border:2px solid #ff0044;cursor:move;touch-action:none;display:flex;align-items:center;justify-content:center;flex-direction:column}
.cl-hit.cl-selected{background:rgba(255,220,0,.35);border:3px solid #ffdd00;box-shadow:0 0 12px #ffdd00;z-index:100}
.cl-hit-label{font-size:9px;color:#fff;background:#ff0044;padding:2px 5px;pointer-events:none;white-space:nowrap;font-weight:bold}
.cl-hit.cl-selected .cl-hit-label{background:#ffdd00;color:#000}
.cl-hit-coords{font-size:8px;color:#fff;background:rgba(0,0,0,.85);padding:2px 4px;margin-top:2px;pointer-events:none;white-space:nowrap;line-height:1.3;text-align:center}
.cl-hit.cl-selected .cl-hit-coords{background:#ffdd00;color:#000}
.cl-resize{position:absolute;right:-12px;bottom:-12px;width:26px;height:26px;background:#00ff88;border:2px solid #000;border-radius:50%;display:none;touch-action:none;z-index:200}
.cl-hit.cl-selected .cl-resize{display:block}

#cl-tools{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.92);border-bottom:2px solid #ff0044;padding:5px;z-index:9000;display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.cl-tbtn{background:#222;color:#fff;border:1px solid #ff0044;padding:6px 8px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer}
.cl-tbtn.cl-nav{background:#004488;border-color:#0088ff}
.cl-tbtn.cl-exp{background:#00aa44;border-color:#00ff88}

#cl-export{position:fixed;inset:20px;background:#000;border:3px solid #00ff88;padding:12px;z-index:9500;display:none;overflow:auto;font-size:10px;line-height:1.6;color:#0f0;white-space:pre-wrap}
#cl-export.cl-show{display:block}
#cl-export-close{position:fixed;top:28px;right:28px;background:#ff0044;color:#fff;border:none;padding:8px 12px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;z-index:9600;display:none}
#cl-export-close.cl-show{display:block}

#cl-screenlabel{position:fixed;bottom:6px;left:6px;background:rgba(0,0,0,.85);border:1px solid #ffdd00;padding:5px 8px;font-size:9px;color:#ffdd00;z-index:8000}
</style>
</head>
<body>

<div id="cl-tools">
  <button class="cl-tbtn cl-nav" onclick="cl_show('menu')">MENU</button>
  <button class="cl-tbtn cl-nav" onclick="cl_show('worlds')">WORLDS</button>
  <button class="cl-tbtn cl-nav" onclick="cl_show('levels')">LEVELS</button>
  <button class="cl-tbtn" onclick="cl_addHit()">+ADD</button>
  <button class="cl-tbtn" onclick="cl_delHit()">DEL</button>
  <button class="cl-tbtn cl-exp" onclick="cl_export()">EXPORT ALL</button>
  <button class="cl-tbtn" onclick="if(confirm('Reset all?'))cl_reset()">RESET</button>
</div>

<div id="cl-app">
  <div id="cl-screen-menu" class="cl-screen cl-active" style="background-image:url('main_menu.png')"></div>
  <div id="cl-screen-worlds" class="cl-screen" style="background-image:url('world_select.png')"></div>
  <div id="cl-screen-levels" class="cl-screen" style="background-image:url('level_select.png')"></div>
</div>

<div id="cl-screenlabel">SCREEN: MENU</div>

<div id="cl-export"></div>
<button id="cl-export-close" onclick="document.getElementById('cl-export').classList.remove('cl-show');this.classList.remove('cl-show')">CLOSE</button>

<script>
var CL_current='menu';
var CL_selected=null;
var CL_hits={menu:[],worlds:[],levels:[]};

var CL_defaults={
  menu:[
    {l:'PLAY',x:18,y:32,w:28,h:15},
    {l:'SKIN',x:18,y:51,w:13,h:10},
    {l:'SHOP',x:33,y:51,w:13,h:10},
    {l:'BACKPACK',x:18,y:65,w:13,h:10},
    {l:'STATS',x:33,y:65,w:15,h:10},
    {l:'HOW',x:25,y:82,w:15,h:5},
    {l:'COINS',x:82,y:5,w:15,h:11}
  ],
  worlds:[
    {l:'BACK',x:10,y:5,w:6,h:12},
    {l:'OVERWORLD',x:15,y:18,w:20,h:75},
    {l:'INFERNO',x:40,y:18,w:20,h:75},
    {l:'ABYSS',x:65,y:18,w:20,h:75}
  ],
  levels:[
    {l:'BACK',x:10,y:6,w:5,h:12},
    {l:'L1',x:27,y:40,w:6,h:12},
    {l:'L2',x:37,y:40,w:6,h:12},
    {l:'L3',x:47,y:40,w:6,h:12},
    {l:'L4',x:57,y:40,w:6,h:12},
    {l:'L5',x:67,y:40,w:6,h:12},
    {l:'L10',x:27,y:66,w:6,h:12},
    {l:'L6',x:37,y:66,w:6,h:12},
    {l:'L7',x:47,y:66,w:6,h:12},
    {l:'L8',x:57,y:66,w:6,h:12},
    {l:'L9',x:67,y:66,w:6,h:12},
    {l:'BOSS',x:82,y:52,w:10,h:22}
  ]
};

function cl_loadStored(){
  var s=localStorage.getItem('CL_tuner2');
  if(s){try{CL_hits=JSON.parse(s);return}catch(e){}}
  cl_reset(true);
}
function cl_save(){localStorage.setItem('CL_tuner2',JSON.stringify(CL_hits))}
function cl_reset(silent){
  CL_hits=JSON.parse(JSON.stringify(CL_defaults));
  cl_save();
  if(!silent)cl_render();
}

function cl_show(name){
  CL_current=name;
  CL_selected=null;
  document.querySelectorAll('.cl-screen').forEach(function(s){s.classList.remove('cl-active')});
  document.getElementById('cl-screen-'+name).classList.add('cl-active');
  document.getElementById('cl-screenlabel').textContent='SCREEN: '+name.toUpperCase();
  cl_render();
}

function cl_render(){
  document.querySelectorAll('.cl-hit').forEach(function(h){h.remove()});
  var screen=document.getElementById('cl-screen-'+CL_current);
  var arr=CL_hits[CL_current];
  arr.forEach(function(h,i){
    var d=document.createElement('div');
    d.className='cl-hit';
    d.style.left=h.x+'%';d.style.top=h.y+'%';
    d.style.width=h.w+'%';d.style.height=h.h+'%';
    d.setAttribute('data-idx',i);
    var coordStr='x:'+h.x.toFixed(1)+' y:'+h.y.toFixed(1)+'<br>w:'+h.w.toFixed(1)+' h:'+h.h.toFixed(1);
    d.innerHTML='<div class="cl-hit-label">'+h.l+'</div><div class="cl-hit-coords">'+coordStr+'</div><div class="cl-resize"></div>';
    if(CL_selected===i)d.classList.add('cl-selected');
    screen.appendChild(d);
  });
}

var CL_drag=null;
document.addEventListener('touchstart',function(e){
  var t=e.target;
  if(t.closest('#cl-tools')||t.closest('#cl-export')||t.id==='cl-export-close'||t.id==='cl-screenlabel')return;
  var hit=t.closest('.cl-hit');
  if(hit){
    e.preventDefault();
    var idx=parseInt(hit.getAttribute('data-idx'));
    CL_selected=idx;
    var touch=e.touches[0];
    var app=document.getElementById('cl-app').getBoundingClientRect();
    var mode=t.classList.contains('cl-resize')?'resize':'move';
    CL_drag={idx:idx,mode:mode,startX:touch.clientX,startY:touch.clientY,
             orig:Object.assign({},CL_hits[CL_current][idx]),
             appW:app.width,appH:app.height};
    cl_render();
  }
},{passive:false});

document.addEventListener('touchmove',function(e){
  if(!CL_drag)return;
  e.preventDefault();
  var t=e.touches[0];
  var dx=(t.clientX-CL_drag.startX)/CL_drag.appW*100;
  var dy=(t.clientY-CL_drag.startY)/CL_drag.appH*100;
  var h=CL_hits[CL_current][CL_drag.idx];
  if(CL_drag.mode==='move'){
    h.x=Math.max(0,Math.min(99,CL_drag.orig.x+dx));
    h.y=Math.max(0,Math.min(99,CL_drag.orig.y+dy));
  } else {
    h.w=Math.max(2,Math.min(100,CL_drag.orig.w+dx));
    h.h=Math.max(2,Math.min(100,CL_drag.orig.h+dy));
  }
  cl_render();
},{passive:false});

document.addEventListener('touchend',function(){
  if(CL_drag){cl_save();CL_drag=null;}
});

function cl_addHit(){
  var name=prompt('Label:','NEW');
  if(!name)return;
  CL_hits[CL_current].push({l:name,x:40,y:40,w:15,h:10});
  CL_selected=CL_hits[CL_current].length-1;
  cl_save();cl_render();
}
function cl_delHit(){
  if(CL_selected===null)return;
  CL_hits[CL_current].splice(CL_selected,1);
  CL_selected=null;
  cl_save();cl_render();
}

function cl_export(){
  var out='=== CHAOSLINE FINAL COORDS ===\n\n';
  ['menu','worlds','levels'].forEach(function(s){
    out+='['+s.toUpperCase()+']\n';
    CL_hits[s].forEach(function(h){
      out+=h.l+': x='+h.x.toFixed(2)+' y='+h.y.toFixed(2)+' w='+h.w.toFixed(2)+' h='+h.h.toFixed(2)+'\n';
    });
    out+='\n';
  });
  var el=document.getElementById('cl-export');
  el.textContent=out;
  el.classList.add('cl-show');
  document.getElementById('cl-export-close').classList.add('cl-show');
}

cl_loadStored();
cl_show('menu');
</script>
</body>
</html>
