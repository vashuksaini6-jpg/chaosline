<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CHAOSLINE</title>
<link rel="preload" as="image" href="loading.png">
<link rel="preload" as="image" href="main_menu.png">
<link rel="preload" as="image" href="world_select.png">
<link rel="preload" as="image" href="level_select.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;font-family:'Press Start 2P',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff}
#cl-app{position:fixed;inset:0;overflow:hidden;background:#000}

.cl-screen{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#000;display:none;opacity:0;transition:opacity .5s ease}
.cl-screen.cl-active{display:block;opacity:1}

/* HITBOXES — invisible but tappable */
.cl-hit{position:absolute;cursor:pointer;background:transparent;border:none}
.cl-hit:active{transform:scale(.94);transition:transform .08s ease}
.cl-hit.cl-locked{cursor:not-allowed}
.cl-hit.cl-locked::after{content:"🔒";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,40px);text-shadow:0 0 6px #000,0 0 10px #000;filter:drop-shadow(0 0 4px rgba(0,0,0,.9));z-index:5;pointer-events:none}
.cl-hit.cl-locked::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:4}

/* HOVER PULSE for unlocked hits */
.cl-hit:not(.cl-locked){animation:cl-pulse 2.5s ease-in-out infinite}
@keyframes cl-pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}

/* CLICK RIPPLE */
.cl-ripple{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.6),transparent 70%);pointer-events:none;transform:translate(-50%,-50%) scale(0);animation:cl-rip .55s ease-out forwards;z-index:9000}
@keyframes cl-rip{to{transform:translate(-50%,-50%) scale(4);opacity:0}}

/* LOADING BAR */
#cl-loadbar{position:absolute;left:12.5%;bottom:11%;width:75%;height:5.5%;overflow:hidden;z-index:3}
#cl-loadbar-fill{width:0%;height:100%;background:linear-gradient(90deg,#8b0000,#ff2222 40%,#ff6644 70%,#ffaa66);box-shadow:0 0 14px #ff0000,inset 0 0 6px rgba(255,255,255,.2);transition:width .1s linear;position:relative}
#cl-loadbar-fill::after{content:"";position:absolute;top:0;right:0;width:4px;height:100%;background:#fff;box-shadow:0 0 12px #fff,0 0 20px #ff4444}

/* EMBER PARTICLES */
.cl-ember{position:absolute;width:3px;height:3px;background:#ff4400;border-radius:50%;box-shadow:0 0 6px #ff6600,0 0 12px #ff2200;pointer-events:none;z-index:2;opacity:.8;animation:cl-float linear infinite}
@keyframes cl-float{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:.9}90%{opacity:.5}100%{transform:translateY(-100vh) translateX(20px);opacity:0}}

/* TITLE GLOW PULSE (subtle overlay on menu title area) */
#cl-title-glow{position:absolute;left:15%;top:5%;width:40%;height:20%;background:radial-gradient(ellipse,rgba(255,0,0,.15),transparent 70%);pointer-events:none;animation:cl-glow 3s ease-in-out infinite;z-index:1;display:none}
.cl-screen.cl-active#cl-screen-menu ~ #cl-title-glow{display:block}
@keyframes cl-glow{0%,100%{opacity:.4}50%{opacity:.9}}

/* JAW TRANSITION */
#cl-jaw{position:fixed;inset:0;pointer-events:none;z-index:9500;display:none}
#cl-jaw.cl-show{display:block}
.cl-jaw-top,.cl-jaw-bot{position:absolute;left:0;width:100%;height:52%;background:linear-gradient(to bottom,#000 0%,#1a0000 100%);transition:transform .4s cubic-bezier(.7,0,.3,1)}
.cl-jaw-top{top:0;transform:translateY(-100%);border-bottom:3px solid #ff0000;box-shadow:0 4px 30px #ff0000,0 0 60px rgba(255,0,0,.5)}
.cl-jaw-bot{bottom:0;transform:translateY(100%);border-top:3px solid #ff0000;box-shadow:0 -4px 30px #ff0000,0 0 60px rgba(255,0,0,.5)}
.cl-jaw-top::after,.cl-jaw-bot::after{content:"";position:absolute;left:0;right:0;height:20px;background-image:linear-gradient(45deg,transparent 33%,#000 33%,#000 66%,transparent 66%),linear-gradient(-45deg,transparent 33%,#000 33%,#000 66%,transparent 66%);background-size:20px 20px;background-position:0 0,10px 0}
.cl-jaw-top::after{bottom:-20px}
.cl-jaw-bot::after{top:-20px}
#cl-jaw.cl-closing .cl-jaw-top,#cl-jaw.cl-closing .cl-jaw-bot{transform:translateY(0)}

/* POPUP */
#cl-popup{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .3s}
#cl-popup.cl-show{display:flex;opacity:1}
.cl-popup-box{background:linear-gradient(135deg,#1a0505,#2a0808);border:3px solid #ff2222;padding:20px 28px;max-width:80%;text-align:center;box-shadow:0 0 30px #ff0000,inset 0 0 20px rgba(255,0,0,.2);transform:scale(.8);transition:transform .3s cubic-bezier(.4,2,.6,1)}
#cl-popup.cl-show .cl-popup-box{transform:scale(1)}
.cl-popup-title{color:#ff4444;font-size:13px;margin-bottom:12px;letter-spacing:2px;text-shadow:0 0 8px #ff0000}
.cl-popup-msg{color:#fff;font-size:9px;line-height:1.7;margin-bottom:18px}
.cl-popup-close{background:linear-gradient(180deg,#ff4444,#cc0000);color:#fff;border:none;padding:10px 22px;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;box-shadow:0 3px 0 #660000;letter-spacing:1px}
.cl-popup-close:active{transform:translateY(2px);box-shadow:0 1px 0 #660000}

/* MUTE */
#cl-mute{position:fixed;bottom:6px;left:6px;background:rgba(0,0,0,.7);border:1px solid #ff2222;color:#fff;padding:6px 8px;font-family:'Press Start 2P',monospace;font-size:11px;cursor:pointer;z-index:8000;border-radius:3px}

/* ROTATION */
#cl-rotate{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
@media (orientation: portrait){#cl-rotate{display:flex}}
.cl-phone{font-size:80px;animation:cl-bounce 1s infinite}
@keyframes cl-bounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(90deg)}}
.cl-rotate-title{color:gold;font-size:18px;margin:24px 0 12px;letter-spacing:2px}
.cl-rotate-sub{color:#aaa;font-size:10px;margin-bottom:32px;line-height:1.6}
.cl-rotate-btn{background:gold;color:#000;border:none;padding:16px 28px;font-family:'Press Start 2P',monospace;font-size:12px;box-shadow:0 4px 0 #a67c00;border-radius:4px;display:flex;align-items:center;gap:10px;cursor:pointer}
.cl-rotate-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #a67c00}
.cl-spin{display:inline-block;animation:cl-spin 2s linear infinite;font-size:16px}
@keyframes cl-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* OPENING FADE */
body{animation:cl-fadein .8s ease-in}
@keyframes cl-fadein{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div id="cl-app">

  <div id="cl-screen-loading" class="cl-screen cl-active" style="background-image:url('loading.png')">
    <div id="cl-loadbar"><div id="cl-loadbar-fill"></div></div>
  </div>

  <div id="cl-screen-menu" class="cl-screen" style="background-image:url('main_menu.png')">
    <div class="cl-hit" style="left:13%;top:32%;width:28%;height:15%" data-cl-action="play"></div>
    <div class="cl-hit" style="left:14%;top:51%;width:13%;height:10%" data-cl-action="soon" data-cl-name="SKIN"></div>
    <div class="cl-hit" style="left:27%;top:51%;width:13%;height:10%" data-cl-action="soon" data-cl-name="SHOP"></div>
    <div class="cl-hit" style="left:13%;top:66%;width:13%;height:10%" data-cl-action="soon" data-cl-name="BACKPACK"></div>
    <div class="cl-hit" style="left:26%;top:66%;width:15%;height:10%" data-cl-action="soon" data-cl-name="STATS"></div>
    <div class="cl-hit" style="left:19%;top:86%;width:15%;height:5%" data-cl-action="howto"></div>
    <div class="cl-hit" style="left:74%;top:5%;width:15%;height:11%" data-cl-action="coins"></div>
  </div>

  <div id="cl-screen-worlds" class="cl-screen" style="background-image:url('world_select.png')">
    <div class="cl-hit" style="left:10%;top:5%;width:6%;height:12%" data-cl-action="back-menu"></div>
    <div class="cl-hit" style="left:15%;top:13%;width:20%;height:75%" data-cl-action="world" data-cl-world="0"></div>
    <div class="cl-hit cl-locked" style="left:40%;top:13%;width:20%;height:75%" data-cl-action="world" data-cl-world="1"></div>
    <div class="cl-hit cl-locked" style="left:66%;top:12%;width:20%;height:75%" data-cl-action="world" data-cl-world="2"></div>
  </div>

  <div id="cl-screen-levels" class="cl-screen" style="background-image:url('level_select.png')">
    <div class="cl-hit" style="left:15%;top:6%;width:5%;height:12%" data-cl-action="back-worlds"></div>
    <div class="cl-hit" style="left:24%;top:34%;width:6%;height:12%" data-cl-action="level" data-cl-level="1"></div>
    <div class="cl-hit cl-locked" style="left:33%;top:34%;width:6%;height:12%" data-cl-action="level" data-cl-level="2"></div>
    <div class="cl-hit cl-locked" style="left:43%;top:34%;width:6%;height:12%" data-cl-action="level" data-cl-level="3"></div>
    <div class="cl-hit cl-locked" style="left:52%;top:34%;width:6%;height:12%" data-cl-action="level" data-cl-level="4"></div>
    <div class="cl-hit cl-locked" style="left:62%;top:35%;width:6%;height:12%" data-cl-action="level" data-cl-level="5"></div>
    <div class="cl-hit cl-locked" style="left:24%;top:64%;width:6%;height:12%" data-cl-action="level" data-cl-level="10"></div>
    <div class="cl-hit cl-locked" style="left:33%;top:64%;width:6%;height:12%" data-cl-action="level" data-cl-level="6"></div>
    <div class="cl-hit cl-locked" style="left:42%;top:64%;width:6%;height:12%" data-cl-action="level" data-cl-level="7"></div>
    <div class="cl-hit cl-locked" style="left:52%;top:65%;width:6%;height:12%" data-cl-action="level" data-cl-level="8"></div>
    <div class="cl-hit cl-locked" style="left:61%;top:64%;width:6%;height:12%" data-cl-action="level" data-cl-level="9"></div>
    <div class="cl-hit cl-locked" style="left:70%;top:52%;width:10%;height:22%" data-cl-action="boss"></div>
  </div>

</div>

<div id="cl-title-glow"></div>

<div id="cl-jaw"><div class="cl-jaw-top"></div><div class="cl-jaw-bot"></div></div>

<div id="cl-popup">
  <div class="cl-popup-box">
    <div class="cl-popup-title" id="cl-popup-title">TITLE</div>
    <div class="cl-popup-msg" id="cl-popup-msg">Message</div>
    <button class="cl-popup-close" onclick="cl_closePopup()">OK</button>
  </div>
</div>

<button id="cl-mute" onclick="cl_toggleMute()">🔊</button>

<div id="cl-rotate">
  <div class="cl-phone">📱</div>
  <div class="cl-rotate-title">ROTATE YOUR PHONE</div>
  <div class="cl-rotate-sub">CHAOSLINE plays in landscape</div>
  <button class="cl-rotate-btn" onclick="cl_forceLandscape()"><span class="cl-spin">↻</span> TAP TO ROTATE</button>
</div>

<script>
var CL_coins=parseInt(localStorage.getItem('CL_coins')||'0');
var CL_unlockedLevels=JSON.parse(localStorage.getItem('CL_unlockedLevels')||'[1]');
var CL_unlockedWorlds=JSON.parse(localStorage.getItem('CL_unlockedWorlds')||'[0]');
var CL_soundMuted=localStorage.getItem('CL_soundMuted')==='1';
var CL_audioCtx=null;

function cl_audio(){if(!CL_audioCtx){try{CL_audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return CL_audioCtx}
function cl_beep(freq,endFreq,type,dur,vol){
  if(CL_soundMuted)return;var ctx=cl_audio();if(!ctx)return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(freq,ctx.currentTime);
  if(endFreq)o.frequency.exponentialRampToValueAtTime(Math.max(1,endFreq),ctx.currentTime+dur);
  g.gain.setValueAtTime(vol||.15,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);
}
function cl_arp(freqs,type,each,vol){
  freqs.forEach(function(f,i){setTimeout(function(){cl_beep(f,f*1.5,type,each,vol)},i*each*1000)});
}
function cl_snd(n){
  switch(n){
    case 'click':cl_beep(820,600,'square',.09,.14);break;
    case 'chomp':cl_beep(80,38,'sawtooth',.4,.3);break;
    case 'pop':cl_beep(560,920,'sine',.18,.18);break;
    case 'lock':cl_beep(190,95,'square',.28,.18);break;
    case 'unlock':cl_arp([880,1108,1318],'sine',.12,.2);break;
    case 'load':cl_beep(440,660,'sine',.15,.1);break;
    case 'boot':cl_arp([523,659,784,1046],'sine',.1,.15);break;
  }
}
function cl_vibe(ms){if(navigator.vibrate)navigator.vibrate(ms)}

/* SCREEN + TRANSITION */
function cl_show(id){
  document.querySelectorAll('.cl-screen').forEach(function(s){s.classList.remove('cl-active')});
  var el=document.getElementById('cl-screen-'+id);
  if(el)el.classList.add('cl-active');
}
function cl_transition(toId){
  var jaw=document.getElementById('cl-jaw');
  jaw.classList.add('cl-show','cl-closing');
  cl_snd('chomp');cl_vibe(150);
  setTimeout(function(){cl_show(toId)},420);
  setTimeout(function(){jaw.classList.remove('cl-closing');cl_snd('pop')},550);
  setTimeout(function(){jaw.classList.remove('cl-show')},1000);
}

/* POPUP */
function cl_popup(title,msg){
  document.getElementById('cl-popup-title').textContent=title;
  document.getElementById('cl-popup-msg').textContent=msg;
  document.getElementById('cl-popup').classList.add('cl-show');
  cl_snd('pop');cl_vibe(40);
}
function cl_closePopup(){
  document.getElementById('cl-popup').classList.remove('cl-show');
  cl_snd('click');cl_vibe(22);
}

/* RIPPLE */
function cl_ripple(x,y){
  var r=document.createElement('div');
  r.className='cl-ripple';
  r.style.left=x+'px';r.style.top=y+'px';
  r.style.width='120px';r.style.height='120px';
  document.body.appendChild(r);
  setTimeout(function(){r.remove()},600);
}

/* CLICK DELEGATION */
document.addEventListener('click',function(e){
  var t=e.target.closest('.cl-hit');if(!t)return;
  cl_ripple(e.clientX,e.clientY);
  var act=t.getAttribute('data-cl-action');
  if(t.classList.contains('cl-locked')){
    cl_snd('lock');cl_vibe(60);
    cl_popup('LOCKED','Complete previous stage to unlock this content.');
    return;
  }
  cl_snd('click');cl_vibe(22);
  switch(act){
    case 'play':cl_transition('worlds');break;
    case 'soon':cl_popup('COMING SOON',(t.getAttribute('data-cl-name')||'This feature')+' ships in the next update.');break;
    case 'howto':cl_popup('HOW TO PLAY','Tap = jump. Reach the flag. Avoid every trap. Die = restart. Rage responsibly.');break;
    case 'coins':cl_popup('COINS','Balance: '+CL_coins+' coins.\n\nEarn by beating levels + finding hidden pickups.');break;
    case 'back-menu':cl_transition('menu');break;
    case 'back-worlds':cl_transition('worlds');break;
    case 'world':
      var w=parseInt(t.getAttribute('data-cl-world'));
      if(CL_unlockedWorlds.indexOf(w)<0){cl_snd('lock');cl_popup('WORLD LOCKED','Beat the previous world first.');return}
      cl_transition('levels');break;
    case 'level':
      var lv=parseInt(t.getAttribute('data-cl-level'));
      cl_popup('LEVEL '+lv,'Gameplay engine ships next build. Menu system verified.');break;
    case 'boss':cl_popup('HOLLOW KING','Boss fight unlocks after Level 10.');break;
  }
});

/* ROTATION */
function cl_forceLandscape(){
  cl_vibe([50,30,50]);
  try{
    var el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    setTimeout(function(){if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){})},300);
  }catch(e){}
}

/* MUTE */
function cl_toggleMute(){
  CL_soundMuted=!CL_soundMuted;
  localStorage.setItem('CL_soundMuted',CL_soundMuted?'1':'0');
  document.getElementById('cl-mute').textContent=CL_soundMuted?'🔇':'🔊';
  cl_vibe(22);
}
document.getElementById('cl-mute').textContent=CL_soundMuted?'🔇':'🔊';

/* EMBER PARTICLES */
function cl_spawnEmbers(){
  var app=document.getElementById('cl-app');
  for(var i=0;i<15;i++){
    var e=document.createElement('div');
    e.className='cl-ember';
    e.style.left=(Math.random()*100)+'%';
    e.style.bottom='-10px';
    e.style.animationDuration=(6+Math.random()*6)+'s';
    e.style.animationDelay=(Math.random()*8)+'s';
    e.style.width=e.style.height=(2+Math.random()*3)+'px';
    app.appendChild(e);
  }
}

/* LOADING SEQUENCE — 4 seconds */
function cl_runLoading(){
  var bar=document.getElementById('cl-loadbar-fill');
  var p=0;
  cl_snd('boot');
  var iv=setInterval(function(){
    p+=2.5;
    bar.style.width=p+'%';
    if(p%20===0)cl_snd('load');
    if(p>=100){
      clearInterval(iv);
      setTimeout(function(){cl_transition('menu');cl_spawnEmbers()},400);
    }
  },100);
}

/* INIT */
setTimeout(cl_runLoading,300);
</script>
</body>
</html>
