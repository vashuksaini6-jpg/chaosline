<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CHAOSLINE Hitbox Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #02030a; color: #fff; font-family: monospace; }
  
  /* ============ ROTATION WRAPPER ============
     If device is in portrait, rotate the entire app 90deg
     so landscape PNGs display correctly. */
  #rotator {
    position: fixed;
    top: 0; left: 0;
    transform-origin: top left;
    background: #02030a;
  }
  
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 40px;
    background: #050d20; display: flex; align-items: center;
    padding: 0 10px; gap: 8px; z-index: 100; border-bottom: 1px solid #1e3a8a;
  }
  #topbar button {
    background: #0a1a3d; color: #fff; border: 1px solid #1e3a8a;
    padding: 6px 12px; font-family: monospace; font-size: 12px;
    cursor: pointer; border-radius: 3px;
  }
  #topbar button.active { background: #1e3a8a; border-color: #4a7fff; }
  #topbar .info { margin-left: auto; font-size: 11px; color: #8ab4ff; }
  
  #stage {
    position: absolute; top: 40px; left: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  
  #canvas {
    position: relative;
    background: #000;
  }
  
  #canvas img {
    display: block; width: 100%; height: 100%;
    pointer-events: none;
  }
  
  .hitbox {
    position: absolute;
    border: 2px solid;
    background: rgba(255,255,255,0.08);
    touch-action: none;
    cursor: move;
  }
  .hitbox.selected {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 12px currentColor;
  }
  .hitbox .label {
    position: absolute; top: -18px; left: 0;
    background: rgba(0,0,0,0.85); padding: 2px 6px;
    font-size: 10px; white-space: nowrap;
    border-radius: 2px; pointer-events: none;
  }
  .hitbox .coords {
    position: absolute; bottom: -16px; left: 0;
    background: rgba(0,0,0,0.85); padding: 1px 4px;
    font-size: 9px; white-space: nowrap;
    border-radius: 2px; pointer-events: none;
    color: #8ab4ff;
  }
  .handle {
    position: absolute; width: 18px; height: 18px;
    background: #fff; border: 1px solid #000;
    right: -9px; bottom: -9px;
    cursor: nwse-resize; touch-action: none;
  }
</style>
</head>
<body>

<div id="rotator">
  <div id="topbar">
    <button data-screen="loading">Loading</button>
    <button data-screen="main_menu">Main</button>
    <button data-screen="world_select">Worlds</button>
    <button data-screen="level_select">Levels</button>
    <span class="info">1920×1080 | Drag=move | Corner=resize</span>
  </div>

  <div id="stage">
    <div id="canvas">
      <img id="bgimg" src="">
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
const SCREENS = {
  loading: {
    file: 'loading.png',
    hitboxes: [
      { id: 'loading_back', color: '#4a9fff', x: 40, y: 40, w: 100, h: 100 },
      { id: 'loading_bar',  color: '#4a9fff', x: 660, y: 950, w: 600, h: 40 }
    ]
  },
  main_menu: {
    file: 'main_menu.png',
    hitboxes: [
      { id: 'main_back',      color: '#4a9fff', x: 40,   y: 40,  w: 100, h: 100 },
      { id: 'main_coin',      color: '#4a9fff', x: 1600, y: 40,  w: 280, h: 90  },
      { id: 'main_play',      color: '#4aff8a', x: 100,  y: 380, w: 560, h: 160 },
      { id: 'main_skin',      color: '#ffd84a', x: 100,  y: 570, w: 260, h: 120 },
      { id: 'main_shop',      color: '#ffd84a', x: 400,  y: 570, w: 260, h: 120 },
      { id: 'main_inventory', color: '#ffd84a', x: 100,  y: 720, w: 260, h: 120 },
      { id: 'main_stats',     color: '#ffd84a', x: 400,  y: 720, w: 260, h: 120 },
      { id: 'main_howto',     color: '#ff6a6a', x: 180,  y: 880, w: 400, h: 60  }
    ]
  },
  world_select: {
    file: 'world_select.png',
    hitboxes: [
      { id: 'world_back',      color: '#4a9fff', x: 40,   y: 40,  w: 100, h: 100 },
      { id: 'world_overworld', color: '#4aff8a', x: 150,  y: 200, w: 460, h: 780 },
      { id: 'world_inferno',   color: '#ffd84a', x: 720,  y: 200, w: 460, h: 780 },
      { id: 'world_abyss',     color: '#ffd84a', x: 1290, y: 200, w: 460, h: 780 }
    ]
  },
  level_select: {
    file: 'level_select.png',
    hitboxes: [
      { id: 'level_back', color: '#4a9fff', x: 40,   y: 40,  w: 100, h: 100 },
      { id: 'level_1',    color: '#4aff8a', x: 260,  y: 490, w: 130, h: 130 },
      { id: 'level_2',    color: '#4aff8a', x: 500,  y: 490, w: 130, h: 130 },
      { id: 'level_3',    color: '#4aff8a', x: 740,  y: 490, w: 130, h: 130 },
      { id: 'level_4',    color: '#4aff8a', x: 980,  y: 490, w: 130, h: 130 },
      { id: 'level_5',    color: '#4aff8a', x: 1220, y: 490, w: 130, h: 130 },
      { id: 'level_6',    color: '#4aff8a', x: 260,  y: 810, w: 130, h: 130 },
      { id: 'level_7',    color: '#4aff8a', x: 500,  y: 810, w: 130, h: 130 },
      { id: 'level_8',    color: '#4aff8a', x: 740,  y: 810, w: 130, h: 130 },
      { id: 'level_9',    color: '#4aff8a', x: 980,  y: 810, w: 130, h: 130 },
      { id: 'level_10',   color: '#4aff8a', x: 1220, y: 810, w: 130, h: 130 },
      { id: 'level_boss', color: '#ff4a4a', x: 1700, y: 780, w: 180, h: 230 }
    ]
  }
};

// ============ STATE ============
const NATIVE_W = 1920;
const NATIVE_H = 1080;
let currentScreen = 'loading';
let scale = 1;
let selected = null;

const rotator = document.getElementById('rotator');
const canvas = document.getElementById('canvas');
const bgimg = document.getElementById('bgimg');
const stage = document.getElementById('stage');

// ============ FORCE LANDSCAPE VIA ROTATION ============
function applyRotation() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isPortrait = vh > vw;
  
  if (isPortrait) {
    // Rotate the entire UI 90 degrees so landscape PNGs fit properly
    rotator.style.width = vh + 'px';
    rotator.style.height = vw + 'px';
    rotator.style.transform = 'rotate(90deg) translateY(-100%)';
    return { w: vh, h: vw };
  } else {
    rotator.style.width = vw + 'px';
    rotator.style.height = vh + 'px';
    rotator.style.transform = 'none';
    return { w: vw, h: vh };
  }
}

function fitCanvas() {
  const view = applyRotation();
  const availW = view.w;
  const availH = view.h - 40; // minus topbar
  
  stage.style.width = availW + 'px';
  stage.style.height = availH + 'px';
  
  const scaleW = availW / NATIVE_W;
  const scaleH = availH / NATIVE_H;
  scale = Math.min(scaleW, scaleH);
  canvas.style.width  = (NATIVE_W * scale) + 'px';
  canvas.style.height = (NATIVE_H * scale) + 'px';
  updateAllHitboxVisuals();
}

function loadScreen(name) {
  currentScreen = name;
  bgimg.src = SCREENS[name].file;
  document.querySelectorAll('.hitbox').forEach(el => el.remove());
  SCREENS[name].hitboxes.forEach(hb => createHitbox(hb));
  document.querySelectorAll('#topbar button').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === name);
  });
  fitCanvas();
}

function createHitbox(hb) {
  const el = document.createElement('div');
  el.className = 'hitbox';
  el.dataset.id = hb.id;
  el.style.color = hb.color;
  el.style.borderColor = hb.color;
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = hb.id;
  el.appendChild(label);
  
  const coords = document.createElement('div');
  coords.className = 'coords';
  el.appendChild(coords);
  
  const handle = document.createElement('div');
  handle.className = 'handle';
  el.appendChild(handle);
  
  canvas.appendChild(el);
  applyHitboxVisual(el, hb);
  
  attachDrag(el, hb);
  attachResize(handle, el, hb);
}

function applyHitboxVisual(el, hb) {
  el.style.left   = (hb.x * scale) + 'px';
  el.style.top    = (hb.y * scale) + 'px';
  el.style.width  = (hb.w * scale) + 'px';
  el.style.height = (hb.h * scale) + 'px';
  el.querySelector('.coords').textContent = 
    `x:${Math.round(hb.x)} y:${Math.round(hb.y)} w:${Math.round(hb.w)} h:${Math.round(hb.h)}`;
}

function updateAllHitboxVisuals() {
  SCREENS[currentScreen].hitboxes.forEach(hb => {
    const el = canvas.querySelector(`[data-id="${hb.id}"]`);
    if (el) applyHitboxVisual(el, hb);
  });
}

// ============ ROTATION-AWARE POINTER ============
// Since we rotate the UI 90deg in portrait, we must invert touch coords.
function getPoint(e) {
  let raw;
  if (e.touches && e.touches[0]) raw = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  else raw = { x: e.clientX, y: e.clientY };
  
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isPortrait = vh > vw;
  
  if (isPortrait) {
    // rotate coords: what user sees as X (horizontal on rotated view) = raw Y
    // what user sees as Y = vw - raw X
    return { x: raw.y, y: vw - raw.x };
  }
  return raw;
}

function attachDrag(el, hb) {
  let startX, startY, origX, origY;
  
  function down(e) {
    if (e.target.classList.contains('handle')) return;
    e.preventDefault();
    selectHitbox(el);
    const p = getPoint(e);
    startX = p.x; startY = p.y;
    origX = hb.x; origY = hb.y;
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('mouseup', up);
    document.addEventListener('touchend', up);
  }
  function move(e) {
    e.preventDefault();
    const p = getPoint(e);
    const dx = (p.x - startX) / scale;
    const dy = (p.y - startY) / scale;
    hb.x = Math.max(0, Math.min(NATIVE_W - hb.w, origX + dx));
    hb.y = Math.max(0, Math.min(NATIVE_H - hb.h, origY + dy));
    applyHitboxVisual(el, hb);
  }
  function up() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchend', up);
  }
  
  el.addEventListener('mousedown', down);
  el.addEventListener('touchstart', down, { passive: false });
}

function attachResize(handle, el, hb) {
  let startX, startY, origW, origH;
  
  function down(e) {
    e.preventDefault();
    e.stopPropagation();
    selectHitbox(el);
    const p = getPoint(e);
    startX = p.x; startY = p.y;
    origW = hb.w; origH = hb.h;
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('mouseup', up);
    document.addEventListener('touchend', up);
  }
  function move(e) {
    e.preventDefault();
    const p = getPoint(e);
    const dx = (p.x - startX) / scale;
    const dy = (p.y - startY) / scale;
    hb.w = Math.max(20, Math.min(NATIVE_W - hb.x, origW + dx));
    hb.h = Math.max(20, Math.min(NATIVE_H - hb.y, origH + dy));
    applyHitboxVisual(el, hb);
  }
  function up() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchend', up);
  }
  
  handle.addEventListener('mousedown', down);
  handle.addEventListener('touchstart', down, { passive: false });
}

function selectHitbox(el) {
  document.querySelectorAll('.hitbox').forEach(h => h.classList.remove('selected'));
  el.classList.add('selected');
  selected = el;
}

// ============ INIT ============
document.querySelectorAll('#topbar button').forEach(b => {
  b.addEventListener('click', () => loadScreen(b.dataset.screen));
});

window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 100));
bgimg.addEventListener('load', fitCanvas);

loadScreen('loading');
</script>

</body>
</html>
