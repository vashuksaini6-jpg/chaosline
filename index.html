<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0505">
<title>CHAOSLINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace;color:#fff}
img{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}

#cl-app{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;background:#000}

/* ROTATION WARNING */
#cl-rotate{position:fixed;inset:0;background:#0a0505;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#cl-rotate.cl-show{display:flex}
.cl-rot-emoji{font-size:64px;animation:cl-bounce 1s infinite}
@keyframes cl-bounce{0%,100%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(90deg) translateY(-10px)}}
.cl-rot-title{font-size:18px;color:#ffd700;margin-top:20px;text-shadow:2px 2px 0 #6a1010}
.cl-rot-sub{font-size:10px;color:#ccc;margin-top:12px}
.cl-rot-btn{margin-top:24px;padding:14px 22px;background:#ffd700;color:#000;font-family:inherit;font-size:11px;border:3px solid #fff;cursor:pointer}

/* SCREENS */
.cl-screen{position:absolute;inset:0;width:100%;height:100%;display:none}
.cl-screen.cl-active{display:block}
.cl-screen img.cl-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;pointer-events:none}

/* OVERLAY HITBOXES */
.cl-hit{position:absolute;cursor:pointer;background:transparent;z-index:5}
.cl-hit:active{transform:scale(0.94);transition:transform 80ms}

/* DEBUG mode: uncomment to see hitboxes */
/* .cl-hit{border:1px dashed #0f0;background:rgba(0,255,0,0.1)} */

/* LOADING BAR */
#cl-loadbar{position:absolute;left:20%;top:76.5%;width:0%;height:8%;background:linear-gradient(180deg,#ffea55 0%,#ffb020 50%,#c46010 100%);box-shadow:0 0 12px #ffb020,inset 0 -3px 0 #7a3a05,inset 0 3px 0 #ffe090;z-index:4;border-radius:2px;transition:width 120ms linear}

/* LOCK OVERLAY */
.cl-lockov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;font-size:28px;z-index:6;pointer-events:none;border-radius:50%}
.cl-lockov.cl-hide{display:none}
.cl-lockov.cl-square{border-radius:8px}

/* STARS */
.cl-stars{position:absolute;bottom:-18%;left:0;width:100%;text-align:center;font-size:8px;color:#ffd700;pointer-events:none;z-index:7;letter-spacing:2px;text-shadow:1px 1px 0 #000}

/* ==== IDLE ANIMATION OVERLAYS ==== */
/* Container over each screen for particles */
.cl-anim{position:absolute;inset:0;pointer-events:none;z-index:3;overflow:hidden}

/* Menu button pulse */
.cl-pulse{animation:cl-pulse-anim 1.4s ease-in-out infinite}
@keyframes cl-pulse-anim{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.04);filter:brightness(1.15)}}

/* Coin spin on top-right coin badge (via CSS mask over PNG area) */
.cl-coinshine{position:absolute;top:3%;right:5%;width:3%;height:12%;background:radial-gradient(circle,rgba(255,255,255,0.7) 0%,transparent 60%);animation:cl-shine 2s linear infinite;pointer-events:none;z-index:8}
@keyframes cl-shine{0%{opacity:0;transform:translateX(-30px)}50%{opacity:1}100%{opacity:0;transform:translateX(30px)}}

/* Floating embers (menu + world screens) */
.cl-ember{position:absolute;width:4px;height:4px;background:#ff8020;border-radius:50%;box-shadow:0 0 6px #ff6010;opacity:0.8}

/* Loading phoenix pulse (over center of loading PNG) */
.cl-phoenix-glow{position:absolute;top:8%;left:35%;width:30%;height:50%;background:radial-gradient(ellipse,rgba(255,220,120,0.35) 0%,transparent 60%);animation:cl-phoenix-pulse 1.6s ease-in-out infinite;pointer-events:none;z-index:2}
@keyframes cl-phoenix-pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.9;transform:scale(1.08)}}

/* Level button pulse (unlocked ones) */
.cl-lvlpulse{animation:cl-lvlpulse-anim 1.8s ease-in-out infinite}
@keyframes cl-lvlpulse-anim{0%,100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0))}50%{filter:drop-shadow(0 0 12px rgba(255,255,255,0.7))}}

/* Boss button pulse (red glow) */
.cl-bosspulse{animation:cl-boss-anim 1.2s ease-in-out infinite}
@keyframes cl-boss-anim{0%,100%{filter:drop-shadow(0 0 4px #ff0000)}50%{filter:drop-shadow(0 0 20px #ff0000)}}

/* World card idle sway */
.cl-worldpulse{animation:cl-worldsway 3s ease-in-out infinite}
@keyframes cl-worldsway{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Character breathing (menu screen) */
.cl-charbreath{position:absolute;right:4%;bottom:5%;width:22%;height:70%;pointer-events:none;z-index:2;animation:cl-breath 2.4s ease-in-out infinite}
@keyframes cl-breath{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Screen fade-in */
.cl-screen.cl-active{animation:cl-fadein 0.5s ease-out}
@keyframes cl-fadein{0%{opacity:0}100%{opacity:1}}

/* JAW TRANSITION */
#cl-jaw{position:fixed;inset:0;z-index:8000;pointer-events:none;display:none}
#cl-jaw.cl-active{display:block}
.cl-jaw-top,.cl-jaw-bot{position:absolute;left:0;width:100%;height:55%;background:#0a0000;transition:transform 400ms cubic-bezier(0.6,0,0.4,1)}
.cl-jaw-top{top:0;transform:translateY(-100%);clip-path:polygon(0 0,100% 0,100% 92%,96% 100%,92% 92%,88% 100%,84% 92%,80% 100%,76% 92%,72% 100%,68% 92%,64% 100%,60% 92%,56% 100%,52% 92%,48% 100%,44% 92%,40% 100%,36% 92%,32% 100%,28% 92%,24% 100%,20% 92%,16% 100%,12% 92%,8% 100%,4% 92%,0 100%)}
.cl-jaw-bot{bottom:0;transform:translateY(100%);clip-path:polygon(0 8%,4% 0,8% 8%,12% 0,16% 8%,20% 0,24% 8%,28% 0,32% 8%,36% 0,40% 8%,44% 0,48% 8%,52% 0,56% 8%,60% 0,64% 8%,68% 0,72% 8%,76% 0,80% 8%,84% 0,88% 8%,92% 0,96% 8%,100% 0,100% 100%,0 100%)}
#cl-jaw.cl-close .cl-jaw-top{transform:translateY(0)}
#cl-jaw.cl-close .cl-jaw-bot{transform:translateY(0)}

/* POPUP */
#cl-popup{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:7000;display:none;align-items:center;justify-content:center}
#cl-popup.cl-show{display:flex}
.cl-popup-box{background:#1a0505;border:4px solid #ffd700;padding:24px;max-width:80%;text-align:center;box-shadow:0 0 30px rgba(255,215,0,0.4);animation:cl-pop-in 0.3s ease-out}
@keyframes cl-pop-in{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
.cl-popup-title{font-size:14px;color:#ffd700;margin-bottom:16px}
.cl-popup-text{font-size:9px;color:#fff;line-height:1.8;margin-bottom:20px;white-space:pre-line}
.cl-popup-btn{padding:12px 20px;background:#c94040;color:#fff;font-family:inherit;font-size:10px;border:3px solid #fff;cursor:pointer}

/* MUTE */
#cl-mute{position:fixed;bottom:8px;left:8px;width:40px;height:40px;background:rgba(0,0,0,0.6);border:2px solid #fff;color:#fff;font-size:16px;z-index:6000;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px}

/* RIPPLE + SPARKS */
.cl-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.5);pointer-events:none;transform:scale(0);animation:cl-ripple-anim 0.55s ease-out forwards;z-index:100}
@keyframes cl-ripple-anim{to{transform:scale(4);opacity:0}}
.cl-spark{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:101}
</style>
</head>
<body>

<div id="cl-rotate">
  <div class="cl-rot-emoji">📱</div>
  <div class="cl-rot-title">ROTATE YOUR PHONE</div>
  <div class="cl-rot-sub">CHAOSLINE plays in landscape</div>
  <button class="cl-rot-btn" onclick="cl_forceRotate()">↻ TAP TO ROTATE</button>
</div>

<div id="cl-app">

  <!-- LOADING SCREEN -->
  <div class="cl-screen cl-active" id="cl-scr-loading">
    <img class="cl-bg" src="loading.png" alt="">
    <div class="cl-phoenix-glow"></div>
    <div class="cl-anim" id="cl-anim-loading"></div>
    <div id="cl-loadbar"></div>
  </div>

  <!-- MAIN MENU -->
  <div class="cl-screen" id="cl-scr-menu">
    <img class="cl-bg" src="main_menu.png" alt="">
    <div class="cl-anim" id="cl-anim-menu"></div>
    <div class="cl-coinshine"></div>
    <div class="cl-hit cl-pulse" style="left:3%;top:31%;width:29%;height:14%" data-cl-act="play"></div>
    <div class="cl-hit" style="left:3%;top:48%;width:16%;height:12%" data-cl-act="skin"></div>
    <div class="cl-hit" style="left:21%;top:48%;width:19%;height:12%" data-cl-act="shop"></div>
    <div class="cl-hit" style="left:3%;top:63%;width:11%;height:14%" data-cl-act="backpack"></div>
    <div class="cl-hit" style="left:16%;top:63%;width:24%;height:14%" data-cl-act="stats"></div>
    <div class="cl-hit" style="left:22%;top:83%;width:18%;height:8%" data-cl-act="howto"></div>
  </div>

  <!-- WORLD SELECT -->
  <div class="cl-screen" id="cl-scr-world">
    <img class="cl-bg" src="world_select.png" alt="">
    <div class="cl-anim" id="cl-anim-world"></div>
    <div class="cl-coinshine"></div>
    <div class="cl-hit" style="left:1%;top:2%;width:7%;height:14%" data-cl-act="back-menu"></div>
    <div class="cl-hit cl-worldpulse" style="left:7%;top:20%;width:23%;height:68%;animation-delay:0s" data-cl-act="world1">
      <div class="cl-lockov cl-hide cl-square" id="cl-lock-w1">🔒</div>
    </div>
    <div class="cl-hit cl-worldpulse" style="left:38%;top:20%;width:23%;height:68%;animation-delay:0.4s" data-cl-act="world2">
      <div class="cl-lockov cl-square" id="cl-lock-w2">🔒</div>
    </div>
    <div class="cl-hit cl-worldpulse" style="left:69%;top:20%;width:23%;height:68%;animation-delay:0.8s" data-cl-act="world3">
      <div class="cl-lockov cl-square" id="cl-lock-w3">🔒</div>
    </div>
  </div>

  <!-- LEVEL SELECT (RECALIBRATED to actual PNG positions) -->
  <div class="cl-screen" id="cl-scr-level">
    <img class="cl-bg" src="level_select.png" alt="">
    <div class="cl-anim" id="cl-anim-level"></div>
    <div class="cl-coinshine"></div>
    <div class="cl-hit" style="left:1%;top:2%;width:7%;height:14%" data-cl-act="back-world"></div>
    <!-- Row 1: levels 1-5 -->
    <div class="cl-hit" style="left:7%;top:30%;width:10%;height:24%;border-radius:50%" data-cl-lvl="1"><div class="cl-lockov cl-hide">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:17.5%;top:30%;width:10%;height:24%;border-radius:50%" data-cl-lvl="2"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:28%;top:30%;width:10%;height:24%;border-radius:50%" data-cl-lvl="3"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:38.5%;top:30%;width:10%;height:24%;border-radius:50%" data-cl-lvl="4"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:49%;top:30%;width:10%;height:24%;border-radius:50%" data-cl-lvl="5"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <!-- Row 2: 10, 6, 7, 8, 9 -->
    <div class="cl-hit" style="left:7%;top:62%;width:10%;height:24%;border-radius:50%" data-cl-lvl="10"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:17.5%;top:62%;width:10%;height:24%;border-radius:50%" data-cl-lvl="6"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:28%;top:62%;width:10%;height:24%;border-radius:50%" data-cl-lvl="7"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:38.5%;top:62%;width:10%;height:24%;border-radius:50%" data-cl-lvl="8"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <div class="cl-hit" style="left:49%;top:62%;width:10%;height:24%;border-radius:50%" data-cl-lvl="9"><div class="cl-lockov">🔒</div><div class="cl-stars"></div></div>
    <!-- Boss -->
    <div class="cl-hit cl-bosspulse" style="left:76%;top:36%;width:14%;height:38%;border-radius:50%" data-cl-lvl="boss"><div class="cl-lockov">🔒</div></div>
  </div>

</div>

<!-- JAW -->
<div id="cl-jaw">
  <div class="cl-jaw-top"></div>
  <div class="cl-jaw-bot"></div>
</div>

<!-- POPUP -->
<div id="cl-popup">
  <div class="cl-popup-box">
    <div class="cl-popup-title" id="cl-pop-title">TITLE</div>
    <div class="cl-popup-text" id="cl-pop-text">Text</div>
    <button class="cl-popup-btn" onclick="cl_closePopup()">OK</button>
  </div>
</div>

<button id="cl-mute" onclick="cl_toggleMute()">🔊</button>

<script>
// ========== GLOBALS ==========
var CL_coins=parseInt(localStorage.getItem('CL_coins')||'0');
var CL_unlockedLevels=JSON.parse(localStorage.getItem('CL_unlockedLevels')||'[1]');
var CL_unlockedWorlds=JSON.parse(localStorage.getItem('CL_unlockedWorlds')||'[1]');
var CL_starRatings=JSON.parse(localStorage.getItem('CL_starRatings')||'{}');
var CL_soundMuted=localStorage.getItem('CL_soundMuted')==='1';
var CL_currentScreen='loading';
var CL_audioCtx=null;
var CL_loadStarted=false;

// ========== AUDIO ==========
function cl_audio(){if(!CL_audioCtx){try{CL_audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}return CL_audioCtx}
function cl_sound(freq,endFreq,dur,vol,type){
  if(CL_soundMuted)return;
  var ctx=cl_audio();if(!ctx)return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(freq,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(endFreq,1),ctx.currentTime+dur);
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+dur);
}
function cl_sfx(name){
  var s={click:[820,600,0.09,0.14,'square'],chomp:[80,38,0.4,0.3,'sawtooth'],pop:[560,920,0.18,0.18,'sine'],lock:[190,95,0.28,0.18,'square'],unlock:[1000,1400,0.4,0.25,'sine']};
  if(s[name])cl_sound.apply(null,s[name]);
}
function cl_toggleMute(){CL_soundMuted=!CL_soundMuted;localStorage.setItem('CL_soundMuted',CL_soundMuted?'1':'0');document.getElementById('cl-mute').textContent=CL_soundMuted?'🔇':'🔊'}
document.getElementById('cl-mute').textContent=CL_soundMuted?'🔇':'🔊';

// ========== VIBRATION ==========
function cl_vibe(p){if(navigator.vibrate)try{navigator.vibrate(p)}catch(e){}}

// ========== ROTATION ==========
function cl_checkRotate(){
  var w=window.innerWidth,h=window.innerHeight;
  var rot=document.getElementById('cl-rotate');
  if(w<h){rot.classList.add('cl-show')}else{rot.classList.remove('cl-show')}
}
function cl_forceRotate(){
  cl_vibe([50,30,50]);
  try{if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen()}catch(e){}
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){})}catch(e){}
}
window.addEventListener('resize',cl_checkRotate);
window.addEventListener('orientationchange',cl_checkRotate);

// ========== SCREEN MGMT ==========
function cl_show(id){
  document.querySelectorAll('.cl-screen').forEach(function(s){s.classList.remove('cl-active')});
  document.getElementById('cl-scr-'+id).classList.add('cl-active');
  CL_currentScreen=id;
  if(id==='level')cl_refreshLevels();
  if(id==='world')cl_refreshWorlds();
}
function cl_jawTransition(nextId){
  var jaw=document.getElementById('cl-jaw');
  jaw.classList.add('cl-active');
  cl_sfx('chomp');cl_vibe(150);
  requestAnimationFrame(function(){jaw.classList.add('cl-close')});
  setTimeout(function(){
    cl_show(nextId);
    setTimeout(function(){
      jaw.classList.remove('cl-close');
      setTimeout(function(){jaw.classList.remove('cl-active')},400);
    },100);
  },400);
}

// ========== CLICK FX ==========
function cl_fx(x,y){
  var app=document.getElementById('cl-app');
  var r=document.createElement('div');
  r.className='cl-ripple';
  r.style.left=(x-30)+'px';r.style.top=(y-30)+'px';
  r.style.width='60px';r.style.height='60px';
  app.appendChild(r);
  setTimeout(function(){r.remove()},600);
  var colors=['#ffd700','#ff8800','#ffffff','#ff2222','#22ff44','#2288ff'];
  for(var i=0;i<6;i++){
    var s=document.createElement('div');
    s.className='cl-spark';
    s.style.background=colors[i];
    s.style.left=(x-3)+'px';s.style.top=(y-3)+'px';
    var ang=(i/6)*Math.PI*2,dist=60;
    var dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist;
    s.animate([{transform:'translate(0,0)',opacity:1},{transform:'translate('+dx+'px,'+dy+'px)',opacity:0}],{duration:650,easing:'ease-out'});
    app.appendChild(s);
    (function(el){setTimeout(function(){el.remove()},700)})(s);
  }
}

// ========== BUTTON HANDLING ==========
document.getElementById('cl-app').addEventListener('click',function(e){
  var t=e.target.closest('.cl-hit');
  if(!t)return;
  cl_fx(e.clientX,e.clientY);
  var act=t.getAttribute('data-cl-act');
  var lvl=t.getAttribute('data-cl-lvl');
  if(act)cl_handleAction(act,t);
  if(lvl)cl_handleLevel(lvl,t);
});

function cl_handleAction(act,el){
  cl_sfx('click');cl_vibe(22);
  switch(act){
    case 'play':cl_vibe(65);cl_jawTransition('world');break;
    case 'skin':cl_popup('SKINS','Coming Soon');break;
    case 'shop':cl_popup('SHOP','Coming Soon');break;
    case 'backpack':cl_popup('BACKPACK','Coming Soon');break;
    case 'stats':cl_popup('MY STATS','Coins: '+CL_coins+'\nLevels: '+(CL_unlockedLevels.length-1)+' cleared');break;
    case 'howto':cl_popup('HOW TO PLAY','TAP to JUMP\nAvoid the traps\nReach the flag\nExpect lies');break;
    case 'back-menu':cl_jawTransition('menu');break;
    case 'back-world':cl_jawTransition('world');break;
    case 'world1':if(CL_unlockedWorlds.indexOf(1)>-1)cl_jawTransition('level');else{cl_sfx('lock');cl_popup('LOCKED','Complete previous world')}break;
    case 'world2':if(CL_unlockedWorlds.indexOf(2)>-1)cl_jawTransition('level');else{cl_sfx('lock');cl_popup('LOCKED','Complete OVERWORLD first')}break;
    case 'world3':if(CL_unlockedWorlds.indexOf(3)>-1)cl_jawTransition('level');else{cl_sfx('lock');cl_popup('LOCKED','Complete NETHER first')}break;
  }
}

function cl_handleLevel(lvl,el){
  if(lvl==='boss'){
    if(CL_unlockedLevels.indexOf(11)>-1){cl_sfx('click');cl_popup('BOSS','Gameplay coming soon')}
    else{cl_sfx('lock');cl_vibe(60);cl_popup('LOCKED','Complete all 10 levels first')}
    return;
  }
  var n=parseInt(lvl);
  if(CL_unlockedLevels.indexOf(n)>-1){
    cl_sfx('click');cl_vibe(65);
    cl_popup('LEVEL '+n,'Gameplay coming soon');
  }else{
    cl_sfx('lock');cl_vibe(60);
    cl_popup('LOCKED','Complete Level '+(n-1)+' first');
  }
}

// ========== REFRESH UI ==========
function cl_refreshLevels(){
  document.querySelectorAll('#cl-scr-level [data-cl-lvl]').forEach(function(el){
    var lvl=el.getAttribute('data-cl-lvl');
    var lock=el.querySelector('.cl-lockov');
    var stars=el.querySelector('.cl-stars');
    var n=lvl==='boss'?11:parseInt(lvl);
    var unlocked=CL_unlockedLevels.indexOf(n)>-1;
    if(unlocked){
      if(lock)lock.classList.add('cl-hide');
      el.classList.add('cl-lvlpulse');
    }else{
      if(lock)lock.classList.remove('cl-hide');
      el.classList.remove('cl-lvlpulse');
    }
    if(stars){var r=CL_starRatings[lvl]||0;stars.textContent=r>0?'★'.repeat(r)+'☆'.repeat(3-r):''}
  });
}
function cl_refreshWorlds(){
  document.getElementById('cl-lock-w1').classList.toggle('cl-hide',CL_unlockedWorlds.indexOf(1)>-1);
  document.getElementById('cl-lock-w2').classList.toggle('cl-hide',CL_unlockedWorlds.indexOf(2)>-1);
  document.getElementById('cl-lock-w3').classList.toggle('cl-hide',CL_unlockedWorlds.indexOf(3)>-1);
}

// ========== POPUP ==========
function cl_popup(title,text){
  document.getElementById('cl-pop-title').textContent=title;
  document.getElementById('cl-pop-text').textContent=text;
  document.getElementById('cl-popup').classList.add('cl-show');
  cl_sfx('pop');
}
function cl_closePopup(){document.getElementById('cl-popup').classList.remove('cl-show');cl_sfx('click');cl_vibe(22)}

// ========== LOADING BAR (fixed: starts immediately, resilient) ==========
function cl_loadStart(){
  if(CL_loadStarted)return;
  CL_loadStarted=true;
  var bar=document.getElementById('cl-loadbar');
  if(!bar)return;
  var p=0;
  bar.style.width='0%';
  var iv=setInterval(function(){
    p+=1.5+Math.random()*2.5;
    if(p>=100){p=100;clearInterval(iv);
      setTimeout(function(){cl_jawTransition('menu')},450);
    }
    bar.style.width=p+'%';
  },60);
}

// ========== IDLE ANIMATIONS ==========
// Floating embers on menu + world + loading
function cl_spawnEmbers(containerId,count,color){
  var c=document.getElementById(containerId);
  if(!c)return;
  for(var i=0;i<count;i++){
    (function(idx){
      var e=document.createElement('div');
      e.className='cl-ember';
      if(color)e.style.background=color,e.style.boxShadow='0 0 6px '+color;
      var startX=Math.random()*100;
      var dur=4000+Math.random()*3000;
      var delay=Math.random()*4000;
      e.style.left=startX+'%';
      e.style.bottom='-10px';
      c.appendChild(e);
      var animate=function(){
        e.animate([
          {transform:'translateY(0) translateX(0)',opacity:0},
          {transform:'translateY(-40px) translateX(10px)',opacity:1,offset:0.2},
          {transform:'translateY(-'+(window.innerHeight*0.9)+'px) translateX('+(Math.random()*60-30)+'px)',opacity:0}
        ],{duration:dur,iterations:Infinity,delay:delay});
      };
      animate();
    })(i);
  }
}

// Sparkle particles on level select (grass sparkles)
function cl_spawnSparkles(containerId,count){
  var c=document.getElementById(containerId);
  if(!c)return;
  for(var i=0;i<count;i++){
    var s=document.createElement('div');
    s.style.position='absolute';
    s.style.width='3px';s.style.height='3px';
    s.style.background='#ffff88';
    s.style.borderRadius='50%';
    s.style.boxShadow='0 0 4px #ffff88';
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(60+Math.random()*35)+'%';
    s.style.opacity='0';
    c.appendChild(s);
    s.animate([
      {opacity:0,transform:'scale(0)'},
      {opacity:1,transform:'scale(1.5)',offset:0.5},
      {opacity:0,transform:'scale(0)'}
    ],{duration:1500+Math.random()*1500,delay:Math.random()*3000,iterations:Infinity});
  }
}

function cl_initAnimations(){
  cl_spawnEmbers('cl-anim-loading',12,'#ff6020');
  cl_spawnEmbers('cl-anim-menu',15,'#ff9040');
  cl_spawnEmbers('cl-anim-world',18,'#ff4020');
  cl_spawnSparkles('cl-anim-level',20);
}

// ========== INIT ==========
window.addEventListener('load',function(){
  cl_checkRotate();
  cl_initAnimations();
  cl_loadStart();
});
// Fallback if 'load' never fires
setTimeout(function(){if(!CL_loadStarted){cl_checkRotate();cl_initAnimations();cl_loadStart()}},800);
// Unlock audio on first tap
document.addEventListener('touchstart',function(){cl_audio()},{once:true});
document.addEventListener('click',function(){cl_audio()},{once:true});
</script>
